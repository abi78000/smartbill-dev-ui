<div class="master-layout">

  <!-- ================= HEADER ================= -->
  <div class="master-top-header">
    <div class="master-top-left">
      <lucide-icon name="tag"></lucide-icon>
      <div>
        <div class="master-title-text">PRICE LIST MASTER</div>
        <div class="master-subtitle-text">ERP Management</div>
      </div>
    </div>

    <div class="master-top-right">
      <button class="master-btn-primary" (click)="newPriceList()">
        <lucide-icon name="plus"></lucide-icon>
        ADD
      </button>

      <button class="master-btn-primary" (click)="reset()">
        <lucide-icon name="refresh-cw"></lucide-icon>
        REFRESH
      </button>
    </div>

    <div class="total-badge saas">
      TOTAL : {{ priceLists.length }}
    </div>
  </div>

  <!-- ================= FORM PANEL ================= -->
  <div class="master-panel">

    <div class="master-header">
      <div class="master-title">
        <lucide-icon name="pencil"></lucide-icon>
        <h2>CREATE PRICE LIST</h2>
      </div>

      <div class="master-actions">
        <button class="master-btn-outline" (click)="save()">
          {{ isEditMode ? 'UPDATE' : 'SAVE' }}
        </button>

        <button class="master-btn-primary" (click)="reset()">
          CLEAR
        </button>
      </div>
    </div>

    <fieldset [disabled]="!isFormEnabled" class="form-disabled-wrapper">

      <div class="form-grid">

        <!-- COMPANY -->
        <div class="form-column">
          <label>Company</label>
          <select
            class="input-common"
            [(ngModel)]="priceList.companyID"
            (change)="onCompanyChange(priceList.companyID)"
            required
            
            
          >
            <option value="">Select Company</option>
            <option *ngFor="let c of companies" [value]="c.companyID">
              {{ c.companyName }}
            </option>
          </select>
        </div>

        <!-- BRANCH -->
        <div class="form-column">
          <label>Branch</label>
          <select
            class="input-common"
            [(ngModel)]="priceList.branchID"
          >
            <option value="">Select Branch</option>
            <option *ngFor="let b of branches" [value]="b.branchID">
              {{ b.branchName }}
            </option>
          </select>
        </div>

        <!-- PRICE LIST NAME -->
        <div class="form-column">
          <label>Price List Name</label>
          <input
            type="text"
            class="input-common"
            [(ngModel)]="priceList.priceListName"
            required
             appInputRestrict="letter"
          />
        </div>

        <!-- STATUS -->
        <div class="form-column">
          <label>Status</label>

          <label class="switch">
            <input
              type="checkbox"
              [(ngModel)]="priceList.isActive"
            />
            <span class="slider"></span>
            <span class="switch-text">
              {{ priceList.isActive ? 'Active' : 'Inactive' }}
            </span>
          </label>
        </div>

      </div>

    </fieldset>

  </div>

  <!-- ================= TABLE PANEL ================= -->
  <div class="master-panel">

    <app-master-table-view
      [data]="priceLists"
      [columns]="columns"
      title="ALL PRICE LISTS"
      companyName="SmartBillPro"
      (edit)="edit($event)"
      (delete)="delete($event)"
    >
    </app-master-table-view>

  </div>

</div>
